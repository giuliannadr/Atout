name: Deploy & Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  # ── Deploy web a Vercel ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --frozen-lockfile

      - run: npm install -g vercel@latest

      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ── Build Electron + GitHub Release ─────────────────────────────────────────
  build-electron:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Solo en tags de versión: v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_glob: 'release/*.exe'
            artifact_name: atout-windows
          - os: macos-latest
            platform: mac
            artifact_glob: 'release/*.dmg'
            artifact_name: atout-macos
          - os: ubuntu-latest
            platform: linux
            artifact_glob: 'release/*.AppImage'
            artifact_name: atout-linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --frozen-lockfile

      - name: Build Vite (electron target)
        run: BUILD_TARGET=electron npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Package Electron (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.config.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 30

  # ── Crear GitHub Release con todos los instaladores ─────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-electron
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Atout ${{ github.ref_name }}
          body: |
            ## Atout ${{ github.ref_name }}

            ### Descargas

            | Plataforma | Archivo |
            |-----------|---------|
            | 🪟 Windows | `.exe` instalador |
            | 🍎 macOS   | `.dmg` |
            | 🐧 Linux   | `.AppImage` portable |

            ### Novedades
            Ver [CHANGELOG](CHANGELOG.md) para la lista completa de cambios.

            > **iOS / Android**: Disponible en breve. Mientras tanto usá la versión web en [atout.vercel.app](https://atout.vercel.app).
          files: release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
