name: Deploy & Release

on:
  push:
    branches: [main]
  # También se puede disparar manualmente para crear una release
  workflow_dispatch:

jobs:
  # ── Deploy web a Vercel ──────────────────────────────────────
  deploy-web:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --frozen-lockfile

      - run: npm install -g vercel@latest

      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ── Build Electron instaladores ─────────────────────────────
  build-electron:
    name: Build Electron (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: release/*.exe
          - os: macos-latest
            target: mac
            artifact: release/*.dmg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --frozen-lockfile

      # Build Vite (sin PWA para Electron)
      - name: Build Vite
        run: npx cross-env BUILD_TARGET=electron npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

      # Empaquetar con electron-builder
      - name: Package Electron
        run: npx electron-builder --${{ matrix.target }} --config electron-builder.config.mjs
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # Sin code signing por ahora
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Subir el instalador como artefacto de la Action
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: fdos-installer-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          retention-days: 30
